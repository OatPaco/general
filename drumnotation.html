<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drum Notation Editor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap');

:root {
  --bg: #ffffff;
  --surface: #f7f7fa;
  --surface-alt: #ededf2;
  --border: #d0d0da;
  --border-strong: #a0a0b0;
  --text: #1a1a2e;
  --dim: #7a7a96;
  --accent: #d44a15;
  --accent-light: #fff0ea;
  --note: #1a1a2e;
  --staff: #888898;
  --playhead: #d44a15;
  --glow: rgba(212,74,21,0.12);
  --select-bg: rgba(66,133,244,0.15);
  --select-border: rgba(66,133,244,0.5);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--bg); color:var(--text);
  font-family:'JetBrains Mono',monospace; font-size:13px;
  min-height:100vh; user-select:none;
}

.header { padding:14px 16px 0; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.header .title-area { flex:1; min-width:180px; }
#songTitle {
  background:transparent; border:none; border-bottom:2px solid var(--border);
  color:var(--accent); font-size:20px; font-weight:800; font-family:inherit;
  letter-spacing:0.04em; width:100%; outline:none; padding:2px 0;
}
#songTitle:focus { border-bottom-color:var(--accent); }
.song-info { font-size:10px; color:var(--dim); margin-top:3px; letter-spacing:0.1em; }

.toolbar {
  display:flex; gap:6px; align-items:center; flex-wrap:wrap;
  padding:10px 16px; border-bottom:1px solid var(--border);
}
.toolbar .sep { width:1px; height:22px; background:var(--border); }
.tb-btn {
  background:var(--surface); color:var(--text); border:1px solid var(--border);
  padding:5px 12px; border-radius:6px; cursor:pointer;
  font-size:11px; font-weight:700; font-family:inherit; transition:all 0.15s;
}
.tb-btn:hover { border-color:var(--accent); color:var(--accent); }
.tb-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 2px 8px var(--glow); }
.ctrl-area { display:flex; align-items:center; gap:6px; }
.ctrl-area label { font-size:10px; color:var(--dim); font-weight:700; text-transform:uppercase; letter-spacing:0.05em; }
.ctrl-area input[type=range] { width:80px; accent-color:var(--accent); }
.ctrl-select,.ctrl-num {
  background:var(--surface); border:1px solid var(--border); color:var(--text);
  padding:4px 6px; border-radius:5px; font-size:12px; text-align:center; font-family:inherit;
}
.ctrl-num { width:48px; }
.ctrl-select { min-width:42px; cursor:pointer; }

.sections-container { padding:12px 16px; }

.section-block {
  background:var(--surface); border-radius:10px; border:1px solid var(--border);
  margin-bottom:10px; overflow:visible; position:relative;
}
.section-header {
  display:flex; align-items:center; gap:8px; padding:8px 12px;
  background:var(--surface-alt); flex-wrap:wrap;
}
.section-type-select { padding:3px 8px; border-radius:5px; font-size:12px; font-weight:700; font-family:inherit; cursor:pointer; }
.section-info { font-size:10px; color:var(--dim); }
.repeat-area { display:flex; align-items:center; gap:4px; }
.repeat-area span { font-size:10px; color:var(--dim); }
.repeat-select {
  background:var(--bg); color:var(--text); border:1px solid var(--border);
  padding:2px 4px; border-radius:4px; font-size:11px; font-family:inherit;
}
.section-header .spacer { flex:1; }
.mini-btn {
  background:var(--bg); color:var(--dim); border:1px solid var(--border);
  padding:3px 8px; border-radius:5px; font-size:10px; font-weight:600;
  font-family:inherit; cursor:pointer;
}
.mini-btn:hover { color:var(--text); border-color:var(--accent); }
.mini-btn.danger { color:#c62828; }
.mini-btn.danger:hover { border-color:#c62828; }

/* Measures - FLEX WRAP to fit screen */
.measures-area {
  display:flex; flex-wrap:wrap; gap:0px 3px; padding:8px 10px; align-items:flex-start;
}

.measure-wrapper {
  flex:1 1 0;
  min-width:60px;
  display:flex;
  flex-direction:column;
  position:relative;
}
.measure-wrapper .m-num {
  border-right:2px solid var(--border-strong);
  border-left:2px solid transparent;
}
.measure-wrapper:last-child .m-num { border-right:3px solid var(--text); }
.measure-wrapper.first-bar .m-num { border-left:3px solid var(--text); }

.grid-labels-col {
  flex-shrink:0; display:flex; flex-direction:column; gap:1px;
  padding-top:18px;
}
.grid-label {
  height:15px; display:flex; align-items:center;
  font-size:10px; color:var(--dim); font-weight:600;
  padding-right:4px; justify-content:flex-end; width:60px;
  gap:2px; position:relative;
}
.grid-label .lbl-name {
  cursor:pointer; white-space:nowrap; 
  border-bottom:1px dashed var(--border);
}
.grid-label .lbl-name:hover { color:var(--accent); border-color:var(--accent); }
.grid-label .lbl-del {
  font-size:8px; color:var(--border-strong); cursor:pointer;
  width:12px; height:12px; display:flex; align-items:center; justify-content:center;
  border-radius:2px; flex-shrink:0;
}
.grid-label .lbl-del:hover { color:#c62828; background:rgba(198,40,40,0.08); }
.add-inst-row {
  height:18px; display:flex; align-items:center; justify-content:flex-end;
  padding-right:4px; width:60px;
}
.add-inst-btn {
  font-size:9px; color:var(--dim); cursor:pointer;
  background:none; border:1px dashed var(--border); border-radius:3px;
  padding:1px 6px; font-family:inherit; font-weight:600;
}
.add-inst-btn:hover { color:var(--accent); border-color:var(--accent); }

/* Instrument picker dropdown */
.inst-picker {
  position:fixed; z-index:250;
  background:var(--bg); border:1px solid var(--border); border-radius:6px;
  box-shadow:0 4px 16px rgba(0,0,0,0.12); padding:2px 0;
  max-height:220px; overflow-y:auto; min-width:140px;
}
.inst-picker-item {
  padding:4px 10px; font-size:11px; cursor:pointer;
  display:flex; align-items:center; gap:6px;
}
.inst-picker-item:hover { background:var(--accent-light); color:var(--accent); }
.inst-picker-item .ip-abbr { font-size:9px; color:var(--dim); margin-left:auto; }

.grid-measure { display:flex; flex-direction:column; gap:1px; width:100%; }
.grid-measure .m-num {
  font-size:9px; color:var(--dim); text-align:center; margin-bottom:2px; font-weight:600;
  cursor:pointer; padding:2px 4px; border-radius:3px; transition:background 0.1s;
}
.grid-measure .m-num:hover { background:var(--accent-light); }
.grid-measure .m-num.start-from {
  background:var(--accent); color:#fff; border-radius:3px;
}
.grid-row { display:flex; gap:1px; width:100%; }
.grid-cell {
  flex:1; height:15px; min-width:8px;
  border-radius:2px; cursor:crosshair; transition:background 0.1s;
  border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; position:relative;
  overflow:visible;
}
.grid-cell:hover { background:var(--accent-light); }
.grid-cell.beat-start { border-left:2px solid var(--border-strong); }
.grid-cell.active { background:var(--accent-light); }
.grid-cell.current { background:rgba(212,74,21,0.12); }
.grid-cell.active.current { background:rgba(212,74,21,0.25); }
.grid-cell .dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--accent); box-shadow:0 0 3px var(--glow);
}
.grid-cell.current .dot { background:var(--playhead); }
/* Snare articulations */
.grid-cell .dot-ghost {
  font-size:9px; color:var(--accent); opacity:0.45; font-weight:400;
  line-height:1; font-family:inherit; letter-spacing:-1px;
}
.grid-cell .dot-rimclick {
  width:9px; height:9px; position:relative;
}
.grid-cell .dot-rimclick::before,
.grid-cell .dot-rimclick::after {
  content:''; position:absolute; background:var(--accent);
  border-radius:1px;
}
.grid-cell .dot-rimclick::before {
  width:9px; height:2px; top:3.5px; left:0;
  transform:rotate(45deg);
}
.grid-cell .dot-rimclick::after {
  width:9px; height:2px; top:3.5px; left:0;
  transform:rotate(-45deg);
}
.grid-cell .dot-rimshot {
  width:9px; height:9px; border-radius:50%;
  background:var(--accent); box-shadow:0 0 0 2px var(--accent), 0 0 0 3px var(--bg);
}
/* Cymbal articulations - using inline SVG in HTML */
.grid-cell .dot-crash svg,
.grid-cell .dot-china svg,
.grid-cell .dot-bell svg { display:block; }
.grid-cell .dot-open {
  width:8px; height:8px; border-radius:50%;
  background:transparent; border:2px solid var(--accent);
}
/* Kick/cymbal 32nd notes */
.grid-cell .dot-32 {
  display:flex; gap:2px; align-items:center;
}
.grid-cell .dot-32 span {
  width:5px; height:5px; border-radius:50%;
}
.grid-cell .dot-32 span.on { background:var(--accent); }
.grid-cell .dot-32 span.off { background:var(--border-strong); }
.grid-cell.selected { outline:2px solid var(--select-border); background:var(--select-bg); }
.grid-cell.active.selected { background:rgba(66,133,244,0.25); }

/* Staff SVG */
.staff-measure-wrap { width:100%; }
.staff-measure-wrap svg { width:100%; height:auto; display:block; }

.move-arrows {
  position:absolute; left:-8px; top:8px;
  display:flex; flex-direction:column; gap:2px; z-index:2;
}
.arrow-btn {
  background:var(--bg); color:var(--dim); border:1px solid var(--border);
  border-radius:4px; width:18px; height:16px; font-size:8px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; padding:0; font-family:inherit;
}
.arrow-btn:hover { color:var(--accent); border-color:var(--accent); }

.add-section-row { display:flex; gap:6px; flex-wrap:wrap; padding:8px 0; }
.add-section-btn {
  padding:5px 12px; border-radius:6px; font-size:11px; font-weight:600;
  font-family:inherit; cursor:pointer;
}
.add-section-btn:hover { filter:brightness(0.92); }

/* Context Menu */
.ctx-menu {
  position:fixed; background:var(--bg); border:1px solid var(--border);
  border-radius:8px; padding:4px 0; box-shadow:0 4px 20px rgba(0,0,0,0.12);
  z-index:200; min-width:160px; font-size:12px;
}
.ctx-menu-item {
  padding:6px 14px; cursor:pointer; display:flex; align-items:center; gap:8px;
}
.ctx-menu-item:hover { background:var(--accent-light); color:var(--accent); }
.ctx-menu-sep { height:1px; background:var(--border); margin:4px 0; }
.ctx-menu-label { padding:4px 14px; font-size:10px; color:var(--dim); font-weight:700; text-transform:uppercase; }
.ctx-menu-row { display:flex; align-items:center; gap:4px; padding:4px 14px; }
.ctx-menu-row label { font-size:10px; color:var(--dim); font-weight:600; }
.ctx-menu-row select {
  background:var(--surface); border:1px solid var(--border); color:var(--text);
  padding:2px 4px; border-radius:4px; font-size:11px; font-family:inherit;
}

/* Modal */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.3);
  display:flex; align-items:center; justify-content:center; z-index:100;
}
.modal-box {
  background:var(--bg); border:1px solid var(--border); border-radius:12px;
  padding:20px; min-width:280px; max-width:400px; max-height:80vh;
  overflow-y:auto; color:var(--text); font-family:'JetBrains Mono',monospace;
  box-shadow:0 8px 30px rgba(0,0,0,0.12);
}
.modal-box h3 { margin:0 0 10px; color:var(--accent); font-size:15px; }
.modal-row {
  display:flex; align-items:center; gap:10px; padding:7px 4px;
  cursor:pointer; border-bottom:1px solid var(--border);
}
.modal-row input[type=checkbox] { accent-color:var(--accent); width:15px; height:15px; }
.modal-row .inst-name { font-size:12px; font-weight:500; }
.modal-row .inst-abbr { font-size:10px; color:var(--dim); margin-left:auto; }
.save-input {
  flex:1; background:var(--surface); border:1px solid var(--border);
  color:var(--text); padding:6px 10px; border-radius:6px; font-size:12px; font-family:inherit;
}
.saved-item { display:flex; align-items:center; gap:8px; padding:7px 4px; border-bottom:1px solid var(--border); }
.saved-item .name { flex:1; font-size:12px; }
.saved-item .bpm-info { font-size:10px; color:var(--dim); }

/* Setlist bar */
.setlist-bar {
  display:flex; align-items:center; gap:8px;
  padding:6px 16px; background:var(--surface-alt);
  border-bottom:2px solid var(--accent);
  position:sticky; top:0; z-index:10;
}
.sl-info { flex:1; display:flex; align-items:center; gap:8px; justify-content:center; }
.sl-nav-btn {
  background:var(--bg); color:var(--text); border:1px solid var(--border);
  padding:4px 14px; border-radius:5px; cursor:pointer; font-size:11px;
  font-weight:700; font-family:inherit;
}
.sl-nav-btn:hover { border-color:var(--accent); color:var(--accent); }
.sl-close-btn {
  background:none; border:none; color:var(--dim); cursor:pointer;
  font-size:14px; padding:2px 6px; font-family:inherit;
}
.sl-close-btn:hover { color:#c62828; }

/* Setlist editor song items */
.sl-song-item {
  display:flex; align-items:center; gap:6px; padding:5px 8px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:5px; margin-bottom:3px; font-size:11px;
}
.sl-song-item .sl-num { color:var(--dim); font-weight:700; width:18px; text-align:center; }
.sl-song-item .sl-title { flex:1; }
.sl-song-item .sl-remove {
  color:var(--dim); cursor:pointer; font-size:10px; padding:2px 4px;
}
.sl-song-item .sl-remove:hover { color:#c62828; }

/* Structure view */
.struct-section {
  display:flex; align-items:center; gap:8px; padding:10px 14px;
  background:var(--surface); border-radius:8px; margin-bottom:6px;
  border-left:4px solid var(--border);
}
.struct-label { font-weight:700; font-size:13px; min-width:90px; }
.struct-bars { font-size:12px; color:var(--dim); }
.struct-hl-label {
  font-size:10px; color:var(--accent); font-weight:700;
  background:var(--accent-light); padding:2px 8px; border-radius:4px;
}
.struct-staff-box {
  margin:4px 0 8px 98px; padding:8px; background:var(--surface-alt);
  border:1px solid var(--border); border-radius:6px; overflow-x:auto;
}
.grid-measure .m-num.highlighted {
  background:#1565c0; color:#fff; border-radius:3px;
}

/* Floating playback bar */
.float-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:50;
  display:flex; align-items:center; gap:4px;
  padding:5px 10px;
  background:rgba(255,255,255,0.97);
  backdrop-filter:blur(8px);
  border-top:2px solid var(--border);
  box-shadow:0 -2px 12px rgba(0,0,0,0.08);
  overflow-x:auto; flex-wrap:nowrap;
}
.fb-btn {
  background:var(--surface); color:var(--text); border:1px solid var(--border);
  padding:3px 8px; border-radius:5px; cursor:pointer;
  font-size:10px; font-weight:700; font-family:inherit;
  white-space:nowrap; flex-shrink:0;
}
.fb-btn:hover { border-color:var(--accent); color:var(--accent); }
.fb-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.fb-play {
  width:34px; height:34px; border-radius:50%; font-size:15px;
  display:flex; align-items:center; justify-content:center;
  padding:0; background:var(--accent); color:#fff; border:2px solid var(--accent);
  box-shadow:0 2px 6px var(--glow); flex-shrink:0;
}
.fb-play:hover { filter:brightness(1.1); }
.fb-play.active { background:#c62828; border-color:#c62828; }
.fb-sep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.fb-group { display:flex; align-items:center; gap:2px; flex-shrink:0; }
.fb-label { font-size:8px; color:var(--dim); font-weight:700; text-transform:uppercase; }
.fb-select {
  background:var(--surface); border:1px solid var(--border); color:var(--text);
  padding:2px 2px; border-radius:3px; font-size:10px; font-family:inherit; cursor:pointer;
}
.fb-bpm {
  width:34px; background:var(--surface); border:1px solid var(--border); color:var(--text);
  padding:2px; border-radius:3px; font-size:10px; text-align:center; font-family:inherit;
}
body { padding-bottom:50px !important; }

::-webkit-scrollbar { height:6px; width:6px; }
::-webkit-scrollbar-track { background:var(--surface); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.hidden { display:none !important; }
</style>
</head>
<body>

<div class="header">
  <div class="title-area">
    <input id="songTitle" value="Untitled Song">
    <div class="song-info" id="songInfo"></div>
  </div>
</div>

<div class="toolbar">
  <button class="tb-btn active" id="btnGrid" onclick="setView('grid')">▦ Grid</button>
  <button class="tb-btn" id="btnStaff" onclick="setView('staff')">𝄞 Staff</button>
  <button class="tb-btn" id="btnStructure" onclick="setView('structure')">📐 Structure</button>
  <div class="sep"></div>
  <button class="tb-btn" onclick="showModal('instModal')">🥁 Instruments</button>
  <button class="tb-btn" onclick="showModal('saveModal')">💾 Save/Load</button>
  <button class="tb-btn" onclick="clearAll()">🗑 Clear</button>
  <div class="sep"></div>
  <div class="ctrl-area">
    <label>Default Beats</label>
    <select class="ctrl-select" id="defBeatsSelect" onchange="state.defaultBeats=+this.value">
      <option value="2">2</option><option value="3">3</option><option value="4" selected>4</option>
      <option value="5">5</option><option value="6">6</option><option value="7">7</option>
    </select>
  </div>
  <div class="ctrl-area">
    <label>Default Sub÷</label>
    <select class="ctrl-select" id="defSubsSelect" onchange="state.defaultSubs=+this.value">
      <option value="2">2nds</option><option value="3">3rds</option>
      <option value="4" selected>4ths</option><option value="6">6ths</option><option value="8">8ths</option>
    </select>
  </div>
</div>

<div class="sections-container" id="sectionsContainer"></div>

<!-- Context menu (hidden) -->
<div class="ctx-menu hidden" id="ctxMenu"></div>

<!-- Instrument Modal -->
<div class="modal-overlay hidden" id="instModal" onclick="hideModal('instModal')">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h3>Instruments</h3>
    <div id="instList"></div>
    <button class="tb-btn active" style="margin-top:12px;width:100%" onclick="hideModal('instModal')">Done</button>
  </div>
</div>

<!-- Save/Load/Setlist Modal -->
<div class="modal-overlay hidden" id="saveModal" onclick="hideModal('saveModal')">
  <div class="modal-box" style="max-width:540px" onclick="event.stopPropagation()">
    <!-- Tabs -->
    <div style="display:flex;gap:4px;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px">
      <button class="tb-btn active" id="tabSongs" onclick="switchTab('songs')">🎵 Local</button>
      <button class="tb-btn" id="tabSetlist" onclick="switchTab('setlist')">📋 Setlists</button>
      <button class="tb-btn" id="tabDrive" onclick="switchTab('drive')">☁️ Drive</button>
      <button class="tb-btn" id="tabDriveSl" onclick="switchTab('driveSl')">☁️ Drive Setlists</button>
    </div>

    <!-- Songs Tab (local) -->
    <div id="panelSongs">
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <input class="save-input" id="saveName" placeholder="Song name...">
        <button class="tb-btn active" onclick="saveSong()">Save</button>
      </div>
      <div id="savedList"></div>
    </div>

    <!-- Setlist Tab (local) -->
    <div id="panelSetlist" class="hidden">
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <input class="save-input" id="setlistName" placeholder="Setlist name...">
        <button class="tb-btn active" onclick="createSetlist()">Create</button>
      </div>
      <div id="setlistList"></div>
      <div class="ctx-menu-sep" style="margin:10px 0"></div>
      <div style="font-size:10px;color:var(--dim);margin-bottom:6px;font-weight:600">EDIT SETLIST</div>
      <div id="setlistEditor" class="hidden">
        <div style="margin-bottom:8px;font-weight:700;color:var(--accent)" id="editingSetlistName"></div>
        <div id="setlistSongs"></div>
        <div style="margin-top:8px">
          <select class="ctrl-select" id="addSongToSetlist" style="min-width:120px">
            <option value="">-- add song --</option>
          </select>
          <button class="mini-btn" onclick="addSongToCurrentSetlist()">+ Add</button>
        </div>
      </div>
    </div>

    <!-- Google Drive Songs Tab -->
    <div id="panelDrive" class="hidden">
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <button class="tb-btn active" onclick="driveSaveCurrent()">☁️ Save current song to Drive</button>
        <button class="tb-btn" onclick="driveListSongs()">🔄 Refresh</button>
      </div>
      <div id="driveStatus" style="font-size:11px;color:var(--dim);margin-bottom:8px"></div>
      <div id="driveSongList"></div>
    </div>

    <!-- Google Drive Setlists Tab -->
    <div id="panelDriveSl" class="hidden">
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <input class="save-input" id="driveSlName" placeholder="New setlist name...">
        <button class="tb-btn active" onclick="driveCreateSetlist()">☁️ Create</button>
        <button class="tb-btn" onclick="driveListSongs()">🔄 Refresh</button>
      </div>
      <div id="driveSlList"></div>
      <div id="driveSlEditor" class="hidden" style="margin-top:10px">
        <div style="font-weight:700;color:var(--accent);margin-bottom:6px" id="driveSlEditName"></div>
        <div id="driveSlSongs"></div>
        <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
          <button class="tb-btn" onclick="driveSlPickerToggle()">+ Add song from Drive</button>
          <button class="tb-btn active" onclick="driveSlSave()">💾 Save setlist</button>
          <button class="tb-btn" onclick="driveSlCancel()">Cancel</button>
        </div>
        <div id="driveSlPicker" class="hidden" style="margin-top:8px;padding:8px;background:var(--surface);border:1px solid var(--border);border-radius:6px"></div>
      </div>
    </div>

    <button class="tb-btn" style="margin-top:12px;width:100%" onclick="hideModal('saveModal')">Close</button>
  </div>
</div>

<!-- Setlist Navigator Bar (shown when a setlist is loaded) -->
<div class="setlist-bar hidden" id="setlistBar">
  <button class="sl-nav-btn" onclick="slPrev()">◀ Prev</button>
  <div class="sl-info">
    <span id="slName" style="font-weight:700;color:var(--accent)"></span>
    <span id="slPos" style="font-size:10px;color:var(--dim)"></span>
  </div>
  <button class="sl-nav-btn" onclick="slNext()">Next ▶</button>
  <button class="sl-close-btn" onclick="closeSetlist()">✕</button>
</div>

<script>
/* ═══ DATA ═══ */
const ALL_INST = [
  {id:"crash",name:"Crash",abbr:"CR",type:"cymbal",sp:-2,freq:0},
  {id:"ride",name:"Ride",abbr:"RD",type:"cymbal",sp:-1.5,freq:0},
  {id:"china",name:"China",abbr:"CH",type:"cymbal",sp:-2.5,freq:0},
  {id:"bell",name:"Bell",abbr:"BL",type:"cymbal",sp:-1.8,freq:0},
  {id:"cowbell",name:"Cowbell",abbr:"CB",type:"drum",sp:-0.5,freq:560},
  {id:"hihat",name:"Hi-Hat",abbr:"HH",type:"cymbal",sp:-1,freq:0},
  {id:"hihat_open",name:"HH Open",abbr:"HO",type:"cymbal_open",sp:-1,freq:0},
  {id:"snare",name:"Snare",abbr:"SN",type:"drum",sp:1,freq:200},
  {id:"tom1",name:"High Tom",abbr:"T1",type:"drum",sp:1.5,freq:300},
  {id:"tom2",name:"Mid Tom",abbr:"T2",type:"drum",sp:2.5,freq:240},
  {id:"tom3",name:"Floor Tom",abbr:"FT",type:"drum",sp:3,freq:180},
  {id:"kick",name:"Kick",abbr:"KK",type:"drum",sp:4,freq:80},
];

// Instruments that can be swapped via drag-select
const SWAP_TARGETS = [
  {id:"hihat",label:"Hi-Hat"},{id:"hihat_open",label:"HH Open"},
  {id:"ride",label:"Ride"},{id:"china",label:"China"},
  {id:"bell",label:"Bell"},{id:"cowbell",label:"Cowbell"},
  {id:"crash",label:"Crash"},
];

const SEC_TYPES = [
  {id:"intro",label:"Intro",color:"#1565c0"},
  {id:"verse",label:"Verse",color:"#2e7d32"},
  {id:"prechorus",label:"Pre-Chorus",color:"#f9a825"},
  {id:"chorus",label:"Chorus",color:"#d84315"},
  {id:"bridge",label:"Bridge",color:"#7b1fa2"},
  {id:"solo",label:"Solo",color:"#c2185b"},
  {id:"outro",label:"Outro",color:"#546e7a"},
  {id:"fill",label:"Fill",color:"#e65100"},
  {id:"breakdown",label:"Breakdown",color:"#4e342e"},
];

let state = {
  sections: [],
  activeIds: ["kick","snare","hihat","tom1","tom2"],
  bpm: 120,
  defaultBeats: 4,
  defaultSubs: 4,
  viewMode: "grid",
  playing: false,
  playPos: null,
  metronome: false,
  // 3-level metronome
  metroDownSound: 'digital',  // sound for beat 1 (downbeat)
  metroBeatSound: 'click',    // sound for other quarter notes
  metroSubDiv: 1,             // subdivision: 1=off, 2=8th, 3=triplet, 4=16th, 6=16th-trip
  metroSubSound: 'soft',      // sound for subdivisions
  muteNotes: false,
  countIn: 1,
  playFromBar: null,
  highlightedBars: {}, // key: "si-mi" → true
};

// Each measure stores its own beats/subs
function emptyMeasure(beats, subs) {
  const b = beats || state.defaultBeats;
  const s = subs || state.defaultSubs;
  const cells = b * s;
  const m = { _beats: b, _subs: s };
  ALL_INST.forEach(i => m[i.id] = new Array(cells).fill(false));
  return m;
}
function getMCells(m) { return m._beats * m._subs; }

function newSection(type, bars) {
  return {
    id: Date.now()+Math.random(), type: type||"verse",
    measures: Array.from({length:bars||4}, ()=>emptyMeasure()),
    repeat: 1,
  };
}

state.sections = [
  newSection("intro",2), newSection("verse",4),
  newSection("chorus",4), newSection("outro",2),
];

/* ═══ AUDIO ═══ */
let audioCtx=null, playTimer=null, playId=0;
function getCtx() {
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==="suspended") audioCtx.resume();
  return audioCtx;
}
function synth(ctx,id,freq,t) {
  if(id==="kick"){const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(40,t+0.12);g.gain.setValueAtTime(1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);o.start(t);o.stop(t+0.3);}
  else if(id==="snare"){const b=ctx.createBuffer(1,ctx.sampleRate*0.15,ctx.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const s=ctx.createBufferSource();s.buffer=b;const ng=ctx.createGain();ng.gain.setValueAtTime(0.7,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.15);s.connect(ng);ng.connect(ctx.destination);s.start(t);const o=ctx.createOscillator(),og=ctx.createGain();o.type="triangle";o.frequency.setValueAtTime(180,t);o.frequency.exponentialRampToValueAtTime(80,t+0.08);og.gain.setValueAtTime(0.6,t);og.gain.exponentialRampToValueAtTime(0.001,t+0.08);o.connect(og);og.connect(ctx.destination);o.start(t);o.stop(t+0.08);}
  else if(id==="hihat"||id==="hihat_open"){const dur=id==="hihat"?0.05:0.25;const b=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const s=ctx.createBufferSource();s.buffer=b;const hp=ctx.createBiquadFilter();hp.type="highpass";hp.frequency.value=7000;const g=ctx.createGain();g.gain.setValueAtTime(0.4,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);s.connect(hp);hp.connect(g);g.connect(ctx.destination);s.start(t);}
  else if(id==="crash"||id==="ride"||id==="china"||id==="bell"){const dur=id==="crash"?0.8:id==="china"?0.6:0.4;const b=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const s=ctx.createBufferSource();s.buffer=b;const bp=ctx.createBiquadFilter();bp.type="bandpass";bp.frequency.value=id==="crash"?5000:id==="china"?4000:id==="bell"?6000:8000;bp.Q.value=id==="bell"?3:1;const g=ctx.createGain();g.gain.setValueAtTime(0.35,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);s.connect(bp);bp.connect(g);g.connect(ctx.destination);s.start(t);}
  else if(id==="cowbell"){const o=ctx.createOscillator(),g=ctx.createGain();o.type="square";o.connect(g);g.connect(ctx.destination);o.frequency.setValueAtTime(560,t);g.gain.setValueAtTime(0.4,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);o.start(t);o.stop(t+0.15);}
  else{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);const f=freq||200;o.frequency.setValueAtTime(f*1.5,t);o.frequency.exponentialRampToValueAtTime(f,t+0.1);g.gain.setValueAtTime(0.6,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.25);o.start(t);o.stop(t+0.25);}
}

/* ═══ PLAYBACK ═══ */
function buildTimeline() {
  const tl=[];
  state.sections.forEach((sec,si)=>{
    for(let r=0;r<sec.repeat;r++){
      sec.measures.forEach((m,mi)=>{ tl.push({si,mi,r,m}); });
    }
  });
  return tl;
}
function togglePlay(){ if(state.playing)stopPlay();else startPlay(); }

function synthMetroClick(ctx,t,type,volume){
  // volume: 1.0=full (downbeat), 0.7=beat, 0.5=sub etc
  const v=volume||0.7;

  if(type==='digital'){
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='square'; o.connect(g); g.connect(ctx.destination);
    o.frequency.setValueAtTime(v>0.8?1500:1000,t);
    g.gain.setValueAtTime(0.35*v,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.03);
    o.start(t);o.stop(t+0.03);
  } else if(type==='click'){
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='sine'; o.connect(g); g.connect(ctx.destination);
    o.frequency.setValueAtTime(v>0.8?1200:800,t);
    g.gain.setValueAtTime(0.5*v,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.05);
    o.start(t);o.stop(t+0.05);
  } else if(type==='beep'){
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='sine'; o.connect(g); g.connect(ctx.destination);
    o.frequency.setValueAtTime(v>0.8?880:660,t);
    g.gain.setValueAtTime(0.4*v,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.08);
    o.start(t);o.stop(t+0.08);
  } else if(type==='wood'){
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='triangle'; o.connect(g); g.connect(ctx.destination);
    o.frequency.setValueAtTime(v>0.8?3000:2200,t);
    o.frequency.exponentialRampToValueAtTime(500,t+0.01);
    g.gain.setValueAtTime(0.6*v,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.025);
    o.start(t);o.stop(t+0.025);
  }
}

function toggleMetronome(){
  state.metronome=!state.metronome;
  document.getElementById('btnMetro').textContent=state.metronome?'🔊 Metro':'🔇 Metro';
  document.getElementById('btnMetro').classList.toggle('active',state.metronome);
}

function toggleMuteNotes(){
  state.muteNotes=!state.muteNotes;
  document.getElementById('btnMuteNotes').textContent=state.muteNotes?'🔇 Notes':'🔈 Notes';
  document.getElementById('btnMuteNotes').classList.toggle('active',state.muteNotes);
}

function setPlayFromBar(si,mi){
  if(state.playFromBar&&state.playFromBar.si===si&&state.playFromBar.mi===mi){
    state.playFromBar=null;
  } else {
    state.playFromBar={si,mi};
  }
  render();
}

function toggleHighlightBar(si,mi){
  const key=si+'-'+mi;
  if(state.highlightedBars[key]) delete state.highlightedBars[key];
  else state.highlightedBars[key]=true;
  render();
}

function startPlay(){
  const ctx=getCtx(); const id=++playId; state.playing=true; renderToolbar();

  // Count-in phase
  const countBars=state.countIn||0;
  const firstMeasure=state.sections[0]?.measures[0];
  const countBeats=firstMeasure?(firstMeasure._beats):state.defaultBeats;
  const countSubs=firstMeasure?(firstMeasure._subs):state.defaultSubs;
  const countTotalCells=countBars*countBeats*countSubs;
  const countCellDur=60/state.bpm/countSubs;

  let countPos=0;
  function countTick(){
    if(playId!==id)return;
    if(countPos>=countTotalCells){ playSong(); return; }
    const cellInBar=countPos%(countBeats*countSubs);
    if(cellInBar===0){
      synthMetroClick(ctx,ctx.currentTime,state.metroDownSound,1.0);
    } else if(cellInBar%countSubs===0){
      synthMetroClick(ctx,ctx.currentTime,state.metroBeatSound,0.7);
    } else if(state.metroSubDiv>1){
      const subCells=countSubs/state.metroSubDiv;
      if(subCells>=1 && cellInBar%subCells===0){
        synthMetroClick(ctx,ctx.currentTime,state.metroBeatSound,0.45);
      }
    }
    countPos++;
    playTimer=setTimeout(countTick,countCellDur*1000);
  }

  function playSong(){
    const tl=buildTimeline();
    const flatCells=[];
    tl.forEach(e=>{ const c=getMCells(e.m); for(let i=0;i<c;i++) flatCells.push({e,cIdx:i,subs:e.m._subs}); });
    const activeInsts=ALL_INST.filter(i=>state.activeIds.includes(i.id));
    // Find start position based on playFromBar
    let pos=0;
    if(state.playFromBar){
      const {si,mi}=state.playFromBar;
      for(let i=0;i<flatCells.length;i++){
        if(flatCells[i].e.si===si&&flatCells[i].e.mi===mi&&flatCells[i].cIdx===0){
          pos=i; break;
        }
      }
    }
    function tick(){
      if(playId!==id)return;
      if(pos>=flatCells.length){stopPlay();return;}
      const f=flatCells[pos];
      state.playPos={sectionIdx:f.e.si,measureIdx:f.e.mi,cellIdx:f.cIdx};
      // Play notes (unless muted)
      if(!state.muteNotes){
        activeInsts.forEach(inst=>{
          const val=f.e.m[inst.id]?.[f.cIdx];
          if(val){
            const art=getArticulation(val);
            synthWithArt(ctx,inst.id,inst.freq,art,ctx.currentTime);
          }
        });
      }
      // Metronome: 3 levels (downbeat=1.0, beat=0.7, sub=0.5)
      if(state.metronome){
        const subs=f.subs;
        if(f.cIdx===0){
          synthMetroClick(ctx,ctx.currentTime,state.metroDownSound,1.0);
        } else if(f.cIdx%subs===0){
          synthMetroClick(ctx,ctx.currentTime,state.metroBeatSound,0.7);
        } else if(state.metroSubDiv>1){
          const subCells=subs/state.metroSubDiv;
          if(subCells>=1 && f.cIdx%subCells===0){
            synthMetroClick(ctx,ctx.currentTime,state.metroBeatSound,0.45);
          }
        }
      }
      updatePlayHighlight();
      const cellDur=60/state.bpm/f.subs;
      pos++;
      playTimer=setTimeout(tick,cellDur*1000);
    }
    tick();
  }

  if(countBars>0) countTick(); else playSong();
}
function stopPlay(){
  playId++; state.playing=false; state.playPos=null;
  if(playTimer)clearTimeout(playTimer);
  renderToolbar(); clearAllHighlights();
}
function updatePlayHighlight(){
  document.querySelectorAll('.grid-cell.current').forEach(el=>el.classList.remove('current'));
  if(!state.playPos)return;
  const{sectionIdx,measureIdx,cellIdx}=state.playPos;
  const secEl=document.querySelector(`[data-section="${sectionIdx}"]`);
  if(!secEl)return;
  const mEl=secEl.querySelector(`[data-measure="${measureIdx}"]`);
  if(!mEl)return;
  mEl.querySelectorAll(`[data-cell="${cellIdx}"]`).forEach(el=>el.classList.add('current'));
  // Scroll only the measures container, not the whole page
  const container=mEl.closest('.measures-area');
  if(container){
    const mRect=mEl.getBoundingClientRect();
    const cRect=container.getBoundingClientRect();
    if(mRect.left<cRect.left||mRect.right>cRect.right){
      mEl.scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"});
    }
  }
}
function clearAllHighlights(){ document.querySelectorAll('.grid-cell.current').forEach(el=>el.classList.remove('current')); }

/* ═══ DRAG SELECT ═══ */
let dragState = null;
let selectedCells = [];
let isDragging = false;
let dragMoved = false;

function startDrag(si,mi,instId,cell,e){
  if(e.button!==0)return;
  e.preventDefault();
  clearSelection();
  isDragging=true;
  dragMoved=false;
  dragState={si,mi,instId,startCell:cell,cells:new Set([cell])};
  markSelected(si,mi,instId,cell);
}
function moveDrag(si,mi,instId,cell){
  if(!isDragging||!dragState||dragState.si!==si||dragState.mi!==mi||dragState.instId!==instId)return;
  if(cell!==dragState.startCell) dragMoved=true;
  const start=Math.min(dragState.startCell,cell);
  const end=Math.max(dragState.startCell,cell);
  document.querySelectorAll('.grid-cell.selected').forEach(el=>el.classList.remove('selected'));
  dragState.cells=new Set();
  for(let c=start;c<=end;c++){
    dragState.cells.add(c);
    markSelected(si,mi,instId,c);
  }
}
function endDrag(){
  if(!isDragging)return;
  isDragging=false;
  if(dragState){
    if(!dragMoved){
      // Single click — toggle the cell
      const d=dragState;
      clearSelection();
      dragState=null;
      toggleCell(d.si,d.mi,d.instId,d.startCell);
      return;
    }
    selectedCells=[];
    dragState.cells.forEach(c=>{
      selectedCells.push({si:dragState.si,mi:dragState.mi,instId:dragState.instId,cell:c});
    });
  }
  dragState=null;
}
function markSelected(si,mi,instId,cell){
  const el=document.querySelector(`[data-section="${si}"] [data-measure="${mi}"] [data-inst="${instId}"][data-cell="${cell}"]`);
  if(el)el.classList.add('selected');
}
function clearSelection(){
  selectedCells=[];
  document.querySelectorAll('.grid-cell.selected').forEach(el=>el.classList.remove('selected'));
}
document.addEventListener('mouseup',endDrag);
document.addEventListener('click',e=>{
  if(!e.target.closest('.ctx-menu')&&!e.target.closest('.grid-cell')){
    hideCtx(); clearSelection();
  }
});

/* ═══ CONTEXT MENU ═══ */
function hideCtx(){ document.getElementById('ctxMenu').classList.add('hidden'); }
document.addEventListener('contextmenu', e=>{
  const cell=e.target.closest('.grid-cell');
  const mnum=e.target.closest('.m-num');
  if(cell){
    e.preventDefault();
    const instId=cell.dataset.inst;
    const cellIdx=+cell.dataset.cell;
    // If drag-selected multiple cells, show swap menu
    if(selectedCells.length>1){
      showSwapMenu(e.clientX,e.clientY);
      return;
    }
    // Find si/mi
    const mw=cell.closest('[data-measure]');
    const sb=cell.closest('[data-section]');
    if(mw&&sb){
      const si=+sb.dataset.section, mi=+mw.dataset.measure;
      const val=state.sections[si].measures[mi][instId]?.[cellIdx];
      if(val && hasArtMenu(instId)){
        showArtMenu(e.clientX,e.clientY,si,mi,instId,cellIdx,val);
        return;
      }
    }
    // If drag-selected cells, show swap menu
    if(selectedCells.length>0){
      showSwapMenu(e.clientX,e.clientY);
    }
    return;
  }
  if(mnum){
    e.preventDefault();
    const si=+mnum.dataset.si, mi=+mnum.dataset.mi;
    showBarMenu(e.clientX,e.clientY,si,mi);
    return;
  }
});

function showArtMenu(x,y,si,mi,instId,c,currentVal){
  const menu=document.getElementById('ctxMenu');
  const currentArt=getArticulation(currentVal);
  const arts=ART_INSTRUMENTS[instId]||[];
  const titles={snare:'Snare Articulation',kick:'Kick',hihat:'Hi-Hat Voice',hihat_open:'HH Open Voice',ride:'Ride Voice'};
  const title=titles[instId]||'Articulation';
  let h=`<div class="ctx-menu-label">${title}</div>`;
  arts.forEach(a=>{
    const sel=a.id===currentArt?' style="font-weight:700;color:var(--accent)"':'';
    h+=`<div class="ctx-menu-item"${sel} onclick="setCellArt(${si},${mi},'${instId}',${c},'${a.id}')">${a.icon} ${a.label}</div>`;
  });
  menu.innerHTML=h;
  positionMenu(menu,x,y);
}

let barClipboard = null; // {measure data}

function showBarMenu(x,y,si,mi){
  const m=state.sections[si].measures[mi];
  const menu=document.getElementById('ctxMenu');
  let h=`<div class="ctx-menu-label">Bar ${mi+1}</div>`;
  h+=`<div class="ctx-menu-item" onclick="copyBar(${si},${mi})">📋 Copy bar</div>`;
  if(barClipboard){
    h+=`<div class="ctx-menu-item" onclick="pasteBar(${si},${mi})">📌 Paste into this bar</div>`;
    h+=`<div class="ctx-menu-item" onclick="insertBarAfter(${si},${mi})">➕ Insert copy after</div>`;
  }
  h+=`<div class="ctx-menu-item" onclick="dupBar(${si},${mi})">⧉ Duplicate bar</div>`;
  h+=`<div class="ctx-menu-sep"></div>`;
  h+=`<div class="ctx-menu-item" onclick="clearBar(${si},${mi})">🗑 Clear bar</div>`;
  if(state.sections[si].measures.length>1){
    h+=`<div class="ctx-menu-item" style="color:#c62828" onclick="deleteBar(${si},${mi})">✕ Delete bar</div>`;
  }
  h+=`<div class="ctx-menu-sep"></div>`;
  h+=`<div class="ctx-menu-label">Time Signature</div>`;
  h+=`<div class="ctx-menu-row"><label>Beats</label><select onchange="setBarBeats(${si},${mi},+this.value)">`;
  [2,3,4,5,6,7].forEach(n=>{ h+=`<option value="${n}" ${m._beats===n?'selected':''}>${n}</option>`; });
  h+=`</select></div>`;
  h+=`<div class="ctx-menu-row"><label>Sub÷</label><select onchange="setBarSubs(${si},${mi},+this.value)">`;
  [2,3,4,6,8].forEach(n=>{ h+=`<option value="${n}" ${m._subs===n?'selected':''}>${n}</option>`; });
  h+=`</select></div>`;
  menu.innerHTML=h;
  positionMenu(menu,x,y);
}

function copyBar(si,mi){
  barClipboard=JSON.parse(JSON.stringify(state.sections[si].measures[mi]));
  hideCtx();
}

function pasteBar(si,mi){
  if(!barClipboard)return;
  const target=state.sections[si].measures[mi];
  const src=JSON.parse(JSON.stringify(barClipboard));
  // Copy note data, adapt to target's cell count
  const targetCells=getMCells(target);
  ALL_INST.forEach(inst=>{
    const srcArr=src[inst.id]||[];
    const arr=new Array(targetCells).fill(false);
    for(let i=0;i<Math.min(srcArr.length,targetCells);i++) arr[i]=srcArr[i];
    target[inst.id]=arr;
  });
  hideCtx(); render();
}

function insertBarAfter(si,mi){
  if(!barClipboard)return;
  const copy=JSON.parse(JSON.stringify(barClipboard));
  state.sections[si].measures.splice(mi+1,0,copy);
  hideCtx(); render();
}

function dupBar(si,mi){
  const copy=JSON.parse(JSON.stringify(state.sections[si].measures[mi]));
  state.sections[si].measures.splice(mi+1,0,copy);
  hideCtx(); render();
}

function clearBar(si,mi){
  const m=state.sections[si].measures[mi];
  ALL_INST.forEach(inst=>{ m[inst.id]=new Array(getMCells(m)).fill(false); });
  hideCtx(); render();
}

function deleteBar(si,mi){
  if(state.sections[si].measures.length<=1)return;
  state.sections[si].measures.splice(mi,1);
  hideCtx(); render();
}

function showSwapMenu(x,y){
  const menu=document.getElementById('ctxMenu');
  let h=`<div class="ctx-menu-label">Change selected notes to</div>`;
  SWAP_TARGETS.forEach(t=>{
    h+=`<div class="ctx-menu-item" onclick="swapSelected('${t.id}')">${t.label}</div>`;
  });
  menu.innerHTML=h;
  positionMenu(menu,x,y);
}

function positionMenu(menu,x,y){
  menu.classList.remove('hidden');
  menu.style.left=x+'px'; menu.style.top=y+'px';
  // Clamp to viewport
  const r=menu.getBoundingClientRect();
  if(r.right>window.innerWidth) menu.style.left=(window.innerWidth-r.width-8)+'px';
  if(r.bottom>window.innerHeight) menu.style.top=(window.innerHeight-r.height-8)+'px';
}

function setBarBeats(si,mi,val){
  const m=state.sections[si].measures[mi];
  const oldCells=getMCells(m);
  m._beats=val;
  const newCells=getMCells(m);
  ALL_INST.forEach(inst=>{
    const old=m[inst.id]||[];
    const arr=new Array(newCells).fill(false);
    for(let i=0;i<Math.min(old.length,newCells);i++) arr[i]=old[i];
    m[inst.id]=arr;
  });
  hideCtx(); render();
}
function setBarSubs(si,mi,val){
  const m=state.sections[si].measures[mi];
  m._subs=val;
  const newCells=getMCells(m);
  ALL_INST.forEach(inst=>{
    const old=m[inst.id]||[];
    const arr=new Array(newCells).fill(false);
    for(let i=0;i<Math.min(old.length,newCells);i++) arr[i]=old[i];
    m[inst.id]=arr;
  });
  hideCtx(); render();
}

function swapSelected(targetInstId){
  if(!selectedCells.length)return;
  // Ensure target instrument is active
  if(!state.activeIds.includes(targetInstId)){
    state.activeIds.push(targetInstId);
  }
  selectedCells.forEach(s=>{
    const m=state.sections[s.si].measures[s.mi];
    // If source cell is active, move note to target
    if(m[s.instId]?.[s.cell]){
      m[s.instId][s.cell]=false;
      if(m[targetInstId]) m[targetInstId][s.cell]=true;
    }
  });
  clearSelection(); hideCtx(); render();
}

/* ═══ RENDER ═══ */
function render(){ renderSections(); renderInfo(); renderToolbar(); }

function renderToolbar(){
  const fb=document.getElementById('fbPlay');
  if(fb){
    fb.textContent=state.playing?'⏹':'▶';
    fb.classList.toggle('active',state.playing);
  }
  document.getElementById('btnGrid').classList.toggle('active',state.viewMode==='grid');
  document.getElementById('btnStaff').classList.toggle('active',state.viewMode==='staff');
  document.getElementById('btnStructure').classList.toggle('active',state.viewMode==='structure');
}

function renderInfo(){
  const tl=buildTimeline();
  let totalSec=0;
  tl.forEach(e=>{ totalSec+=getMCells(e.m)*(60/state.bpm/e.m._subs); });
  const mins=Math.floor(totalSec/60);
  const secs=String(Math.floor(totalSec%60)).padStart(2,'0');
  document.getElementById('songInfo').textContent=
    `DRUM NOTATION • ${tl.length} measures • ${mins}:${secs} @ ${state.bpm} BPM`;
}

function renderSections(){
  const container=document.getElementById('sectionsContainer');
  const activeInsts=ALL_INST.filter(i=>state.activeIds.includes(i.id));

  // ═══ STRUCTURE VIEW ═══
  if(state.viewMode==='structure'){
    let html='<div style="padding:4px 0">';
    state.sections.forEach((sec,si)=>{
      const st=SEC_TYPES.find(s=>s.id===sec.type)||SEC_TYPES[1];
      const typeName=st.label;
      const totalBars=sec.measures.length;

      // Find highlighted bars in this section
      const hlBars=[];
      sec.measures.forEach((m,mi)=>{
        if(state.highlightedBars[si+'-'+mi]) hlBars.push({mi,m});
      });

      if(hlBars.length===0){
        // No highlights — just show section name + bar count
        html+=`<div class="struct-section" style="border-left-color:${st.color}">
          <span class="struct-label" style="color:${st.color}">${typeName}</span>
          <span class="struct-bars">${totalBars} bar${totalBars>1?'s':''}</span>
        </div>`;
      } else {
        // Has highlights — split into segments
        let prevEnd=0;
        hlBars.forEach(hl=>{
          const before=hl.mi-prevEnd;
          if(before>0){
            html+=`<div class="struct-section" style="border-left-color:${st.color}">
              <span class="struct-label" style="color:${st.color}">${typeName}</span>
              <span class="struct-bars">${before} bar${before>1?'s':''}</span>
            </div>`;
          }
          // The highlighted bar — show as staff
          html+=`<div class="struct-section" style="border-left-color:${st.color}">
            <span class="struct-label" style="color:${st.color}">${typeName}</span>
            <span class="struct-hl-label">★ Bar ${hl.mi+1}</span>
          </div>`;
          html+=`<div class="struct-staff-box">`;
          html+=renderStaffMeasure(hl.m,activeInsts,si,hl.mi,getMCells(hl.m));
          html+=`</div>`;
          prevEnd=hl.mi+1;
        });
        // Remaining bars after last highlight
        const after=totalBars-prevEnd;
        if(after>0){
          html+=`<div class="struct-section" style="border-left-color:${st.color}">
            <span class="struct-label" style="color:${st.color}">${typeName}</span>
            <span class="struct-bars">${after} bar${after>1?'s':''}</span>
          </div>`;
        }
      }
    });
    html+='</div>';
    container.innerHTML=html;
    return;
  }

  // ═══ NORMAL VIEW (grid/staff) ═══
  let html='';

  state.sections.forEach((sec,si)=>{
    const st=SEC_TYPES.find(s=>s.id===sec.type)||SEC_TYPES[1];
    html+=`<div class="section-block" data-section="${si}" style="border-left:4px solid ${st.color}">`;
    html+=`<div class="move-arrows">`;
    if(si>0)html+=`<button class="arrow-btn" onclick="moveSection(${si},-1)">▲</button>`;
    if(si<state.sections.length-1)html+=`<button class="arrow-btn" onclick="moveSection(${si},1)">▼</button>`;
    html+=`</div>`;

    html+=`<div class="section-header">`;
    html+=`<select class="section-type-select" onchange="changeSectionType(${si},this.value)"
      style="background:${st.color}18;color:${st.color};border:1px solid ${st.color}55">`;
    SEC_TYPES.forEach(s=>{html+=`<option value="${s.id}" ${s.id===sec.type?'selected':''}>${s.label}</option>`;});
    html+=`</select>`;
    html+=`<div class="spacer"></div>`;
    html+=`<button class="mini-btn" onclick="addMeasure(${si})">+ Bar</button>`;
    html+=`<button class="mini-btn" onclick="removeMeasure(${si})">- Bar</button>`;
    html+=`<button class="mini-btn" onclick="dupSection(${si})">⧉ Dup</button>`;
    html+=`<button class="mini-btn danger" onclick="removeSection(${si})">✕</button>`;
    html+=`</div>`;

    html+=`<div class="measures-area">`;

    // Labels column with interactive controls
    if(state.viewMode==='grid'){
      html+=`<div class="grid-labels-col">`;
      activeInsts.forEach((inst,idx)=>{
        html+=`<div class="grid-label">`;
        html+=`<span class="lbl-del" onclick="removeInst('${inst.id}')" title="Remove">✕</span>`;
        html+=`<span class="lbl-name" onclick="showInstPicker(this,'${inst.id}',${idx})" title="Click to change">${inst.abbr}</span>`;
        html+=`</div>`;
      });
      html+=`<div class="add-inst-row"><button class="add-inst-btn" onclick="showAddInstPicker(this)">+ Add</button></div>`;
      html+=`</div>`;
    }

    sec.measures.forEach((m,mi)=>{
      const CELLS=getMCells(m);
      if(state.viewMode==='grid'){
        html+=`<div class="measure-wrapper${mi===0?' first-bar':''}" data-measure="${mi}">`;
        html+=`<div class="grid-measure">`;
        const isStartBar=state.playFromBar&&state.playFromBar.si===si&&state.playFromBar.mi===mi;
        const isHL=state.highlightedBars[si+'-'+mi];
        html+=`<div class="m-num${isStartBar?' start-from':''}${isHL?' highlighted':''}" data-si="${si}" data-mi="${mi}"
          onclick="setPlayFromBar(${si},${mi})"
          title="Click: play from here | Right-click: bar options">${mi+1} <span style="font-size:8px;color:${isStartBar?'#fff':'var(--dim)'}">(${m._beats}/${m._subs})</span><span style="cursor:pointer;margin-left:2px;font-size:10px;color:${isHL?'#fff':'var(--border)'}" onclick="event.stopPropagation();toggleHighlightBar(${si},${mi})" title="Toggle highlight for structure view">${isHL?'★':'☆'}</span></div>`;
        activeInsts.forEach(inst=>{
          html+=`<div class="grid-row">`;
          for(let c=0;c<CELLS;c++){
            const val=m[inst.id]?.[c];
            const active=!!val;
            const beatStart=c%m._subs===0;
            const isCurr=state.playPos&&state.playPos.sectionIdx===si&&state.playPos.measureIdx===mi&&state.playPos.cellIdx===c;
            let cls='grid-cell';
            if(active)cls+=' active';
            if(beatStart)cls+=' beat-start';
            if(isCurr)cls+=' current';
            html+=`<div class="${cls}" data-cell="${c}" data-inst="${inst.id}"
              onmousedown="startDrag(${si},${mi},'${inst.id}',${c},event)"
              onmouseover="moveDrag(${si},${mi},'${inst.id}',${c})">`;
            if(active){
              const art=getArticulation(val);
              const is32=art.startsWith('32-');
              const isCym=inst.id==='hihat'||inst.id==='hihat_open'||inst.id==='ride';
              // 32nd note for any instrument
              if(is32&&art==='32-both') html+=`<div class="dot-32"><span class="on"></span><span class="on"></span></div>`;
              else if(is32&&art==='32-first') html+=`<div class="dot-32"><span class="on"></span><span class="off"></span></div>`;
              else if(is32&&art==='32-second') html+=`<div class="dot-32"><span class="off"></span><span class="on"></span></div>`;
              // Ghost note (small notehead + parentheses)
              else if(art==='ghost') html+=`<div class="dot-ghost">(•)</div>`;
              // Rimclick
              else if(art==='rimclick') html+=`<div class="dot-rimclick"></div>`;
              // Rimshot
              else if(art==='rimshot') html+=`<div class="dot-rimshot"></div>`;
              // Crash: × with circle — 200% (matching staff)
              else if(isCym&&art==='crash') html+=`<div class="dot-crash"><svg width="20" height="20" viewBox="0 0 20 20" style="overflow:visible"><line x1="3" y1="3" x2="17" y2="17" stroke="#c62828" stroke-width="2.5"/><line x1="17" y1="3" x2="3" y2="17" stroke="#c62828" stroke-width="2.5"/><circle cx="10" cy="10" r="9" fill="none" stroke="#c62828" stroke-width="1.2"/></svg></div>`;
              // China: star — 200%
              else if(isCym&&art==='china') html+=`<div class="dot-china"><svg width="20" height="20" viewBox="0 0 20 20" style="overflow:visible"><polygon points="10,1 12.4,7.2 19,7.2 13.8,11.4 15.6,18 10,13.8 4.4,18 6.2,11.4 1,7.2 7.6,7.2" fill="#7b1fa2"/></svg></div>`;
              // Bell: diamond — 200%
              else if(isCym&&art==='bell') html+=`<div class="dot-bell"><svg width="18" height="18" viewBox="0 0 18 18" style="overflow:visible"><polygon points="9,1 17,9 9,17 1,9" fill="var(--accent)"/></svg></div>`;
              // Open
              else if(isCym&&art==='open') html+=`<div class="dot-open"></div>`;
              // Normal HH/RD — 75% dot
              else if(isCym) html+=`<div class="dot" style="width:5px;height:5px"></div>`;
              // Default
              else html+=`<div class="dot"></div>`;
            }
            html+=`</div>`;
          }
          html+=`</div>`;
        });
        html+=`</div></div>`;
      } else {
        html+=renderStaffMeasure(m,activeInsts,si,mi,CELLS);
      }
    });

    html+=`</div></div>`;
  });

  html+=`<div class="add-section-row">`;
  SEC_TYPES.forEach(st=>{
    html+=`<button class="add-section-btn" onclick="addSection('${st.id}')"
      style="background:${st.color}14;color:${st.color};border:1px solid ${st.color}33">+ ${st.label}</button>`;
  });
  html+=`</div>`;
  container.innerHTML=html;
}

function renderStaffMeasure(m,activeInsts,si,mi,CELLS){
  const lg=8, top=24, cw=14;
  const w=CELLS*cw+8, ht=top+4*lg+28;
  const subs=m._subs;
  const beats=m._beats;

  let svg=`<div class="measure-wrapper${mi===0?' first-bar':''}" data-measure="${mi}">`;
  svg+=`<div class="staff-measure-wrap">`;
  svg+=`<svg viewBox="0 0 ${w} ${ht}" preserveAspectRatio="xMidYMid meet">`;
  svg+=`<text x="${w/2}" y="10" text-anchor="middle" font-size="8" fill="var(--dim)" font-family="inherit">${mi+1} (${beats}/${subs})</text>`;
  for(let i=0;i<5;i++) svg+=`<line x1="2" y1="${top+i*lg}" x2="${w-2}" y2="${top+i*lg}" stroke="var(--staff)" stroke-width="0.7"/>`;
  for(let b=1;b<beats;b++){
    const bx=4+b*subs*cw;
    svg+=`<line x1="${bx}" y1="${top-2}" x2="${bx}" y2="${top+4*lg+2}" stroke="var(--staff)" stroke-width="0.3" stroke-dasharray="2,2"/>`;
  }

  // Determine stem direction by instrument type: cymbal/cymbal_open = UP (-1), drum = DOWN (1)
  function getStemDir(inst){ return (inst.type==='cymbal'||inst.type==='cymbal_open')?-1:1; }

  activeInsts.forEach(inst=>{
    // Collect all active positions with their data
    const notes=[];
    for(let c=0;c<CELLS;c++){
      const val=m[inst.id]?.[c];
      if(val) notes.push({c, val, art:getArticulation(val)});
    }
    const iy=top+inst.sp*lg;
    const dir=getStemDir(inst); // -1=up, 1=down
    const stemLen=20;

    // Compute nFlags per note (gap-based)
    notes.forEach((n,ni)=>{
      let minGap=CELLS;
      if(notes.length>1){
        if(ni>0) minGap=Math.min(minGap, n.c-notes[ni-1].c);
        if(ni<notes.length-1) minGap=Math.min(minGap, notes[ni+1].c-n.c);
      }
      const is32=n.art.startsWith('32-');
      if(is32) n.nFlags=3;
      else if(minGap>=subs) n.nFlags=0;
      else if(minGap>=subs/2) n.nFlags=1;
      else if(minGap>=subs/4) n.nFlags=2;
      else n.nFlags=3;
    });

    // --- BEAMING: group consecutive notes with same nFlags ≥ 1 ---
    // After drawing heads, draw beams between consecutive notes that share flag count
    const beamGroups=[]; // [{startIdx, endIdx, nFlags}]
    let gi=0;
    while(gi<notes.length){
      const nf=notes[gi].nFlags;
      if(nf>=1){
        let gEnd=gi;
        while(gEnd+1<notes.length && notes[gEnd+1].c===notes[gEnd].c+1 && notes[gEnd+1].nFlags>=1){
          gEnd++;
        }
        if(gEnd>gi){
          beamGroups.push({start:gi, end:gEnd, nFlags:Math.min(...notes.slice(gi,gEnd+1).map(n=>n.nFlags))});
          // Mark notes in beam group
          for(let k=gi;k<=gEnd;k++) notes[k].inBeam=true;
        }
        gi=gEnd+1;
      } else { gi++; }
    }

    // Draw each note
    notes.forEach((n,ni)=>{
      const {c,art,nFlags}=n;
      const is32=art.startsWith('32-');
      const x=4+c*cw+cw/2;
      const isCurr=state.playPos&&state.playPos.sectionIdx===si&&state.playPos.measureIdx===mi&&state.playPos.cellIdx===c;
      const col=isCurr?'var(--playhead)':'var(--note)';
      const stemX=dir===-1?(x+4):(x-4);
      const stemY2=iy+dir*stemLen;
      let h='';

      // --- NOTE HEADS ---
      if(inst.type==='cymbal'||inst.type==='cymbal_open'){
        if(art==='crash'){
          // Crash: × with circle + accent — 200% size
          const s=7;
          h+=`<line x1="${x-s}" y1="${iy-s}" x2="${x+s}" y2="${iy+s}" stroke="${col}" stroke-width="2.5"/>`;
          h+=`<line x1="${x+s}" y1="${iy-s}" x2="${x-s}" y2="${iy+s}" stroke="${col}" stroke-width="2.5"/>`;
          h+=`<circle cx="${x}" cy="${iy}" r="${s+2}" fill="none" stroke="${col}" stroke-width="1"/>`;
          h+=`<text x="${x}" y="${iy-10}" text-anchor="middle" font-size="8" fill="${col}">></text>`;
        } else if(art==='china'){
          // China: 5-point star — 200% size
          const r=9, ri=4;
          let pts='';
          for(let p=0;p<5;p++){
            const aOuter=Math.PI/2+p*2*Math.PI/5;
            const aInner=Math.PI/2+(p+0.5)*2*Math.PI/5;
            pts+=`${x-r*Math.cos(aOuter)},${iy-r*Math.sin(aOuter)} `;
            pts+=`${x-ri*Math.cos(aInner)},${iy-ri*Math.sin(aInner)} `;
          }
          h+=`<polygon points="${pts}" fill="${col}"/>`;
        } else if(art==='bell'){
          // Bell: diamond — 200% size
          h+=`<polygon points="${x},${iy-8} ${x+8},${iy} ${x},${iy+8} ${x-8},${iy}" fill="${col}"/>`;
        } else if(art==='open'){
          h+=`<circle cx="${x}" cy="${iy}" r="3.5" fill="none" stroke="${col}" stroke-width="1.5"/>`;
        } else if(is32){
          const s=2.5,off=3;
          const o1=art==='32-second'?0.3:1, o2=art==='32-first'?0.3:1;
          h+=`<line x1="${x-off-s}" y1="${iy-s}" x2="${x-off+s}" y2="${iy+s}" stroke="${col}" stroke-width="${o1<1?0.6:1.2}" opacity="${o1}"/>`;
          h+=`<line x1="${x-off+s}" y1="${iy-s}" x2="${x-off-s}" y2="${iy+s}" stroke="${col}" stroke-width="${o1<1?0.6:1.2}" opacity="${o1}"/>`;
          h+=`<line x1="${x+off-s}" y1="${iy-s}" x2="${x+off+s}" y2="${iy+s}" stroke="${col}" stroke-width="${o2<1?0.6:1.2}" opacity="${o2}"/>`;
          h+=`<line x1="${x+off+s}" y1="${iy-s}" x2="${x+off-s}" y2="${iy+s}" stroke="${col}" stroke-width="${o2<1?0.6:1.2}" opacity="${o2}"/>`;
        } else {
          // Normal HH/RD × — 75% size
          const s=2.6;
          h+=`<line x1="${x-s}" y1="${iy-s}" x2="${x+s}" y2="${iy+s}" stroke="${col}" stroke-width="1.2"/>`;
          h+=`<line x1="${x+s}" y1="${iy-s}" x2="${x-s}" y2="${iy+s}" stroke="${col}" stroke-width="1.2"/>`;
        }
      } else {
        // Drums
        if(art==='ghost'){
          // Ghost: 50% size notehead + parentheses
          h+=`<ellipse cx="${x}" cy="${iy}" rx="2" ry="1.5" fill="${col}" opacity="0.5" transform="rotate(-15 ${x} ${iy})"/>`;
          h+=`<text x="${x-4}" y="${iy+2.5}" font-size="6" fill="${col}" opacity="0.5">(</text>`;
          h+=`<text x="${x+2.2}" y="${iy+2.5}" font-size="6" fill="${col}" opacity="0.5">)</text>`;
        } else if(art==='rimclick'){
          const s=3;
          h+=`<line x1="${x-s}" y1="${iy-s}" x2="${x+s}" y2="${iy+s}" stroke="${col}" stroke-width="1.5"/>`;
          h+=`<line x1="${x+s}" y1="${iy-s}" x2="${x-s}" y2="${iy+s}" stroke="${col}" stroke-width="1.5"/>`;
        } else if(art==='rimshot'){
          h+=`<ellipse cx="${x}" cy="${iy}" rx="4.5" ry="3.2" fill="${col}" transform="rotate(-15 ${x} ${iy})"/>`;
          const ay=iy+dir*stemLen+dir*5;
          h+=`<text x="${stemX}" y="${ay}" text-anchor="middle" font-size="8" font-weight="bold" fill="${col}">></text>`;
        } else if(is32){
          const off=3;
          const op1=(art==='32-second')?0.25:1, op2=(art==='32-first')?0.25:1;
          h+=`<ellipse cx="${x-off}" cy="${iy}" rx="3.2" ry="2.5" fill="${col}" opacity="${op1}" transform="rotate(-15 ${x-off} ${iy})"/>`;
          h+=`<ellipse cx="${x+off}" cy="${iy}" rx="3.2" ry="2.5" fill="${col}" opacity="${op2}" transform="rotate(-15 ${x+off} ${iy})"/>`;
        } else {
          h+=`<ellipse cx="${x}" cy="${iy}" rx="4" ry="3" fill="${col}" transform="rotate(-15 ${x} ${iy})"/>`;
        }
      }

      // --- STEM ---
      h+=`<line x1="${stemX}" y1="${iy}" x2="${stemX}" y2="${stemY2}" stroke="${col}" stroke-width="0.9"/>`;

      // --- FLAGS (only if not in a beam group) ---
      if(nFlags>0 && !n.inBeam){
        for(let f=0;f<nFlags;f++){
          const fy=stemY2-dir*f*3;
          // Stem up (dir=-1): flag curves down-right from top of stem
          // Stem down (dir=1): flag curves up-right from bottom of stem (standard notation)
          const curveY=dir===-1?5:-5;
          h+=`<path d="M${stemX},${fy} q${7},${curveY} ${3},${curveY*2}" stroke="${col}" stroke-width="1.2" fill="none"/>`;
        }
      }

      svg+=h;

      // Ledger lines
      if(iy<top){for(let ly=top-lg;ly>=iy;ly-=lg) svg+=`<line x1="${x-5}" y1="${ly}" x2="${x+5}" y2="${ly}" stroke="var(--staff)" stroke-width="0.5"/>`;}
      if(iy>top+4*lg){for(let ly=top+5*lg;ly<=iy;ly+=lg) svg+=`<line x1="${x-5}" y1="${ly}" x2="${x+5}" y2="${ly}" stroke="var(--staff)" stroke-width="0.5"/>`;}
    });

    // --- DRAW BEAMS for groups ---
    beamGroups.forEach(g=>{
      const minNf=g.nFlags;
      // Draw beam lines connecting stems
      for(let bLevel=0;bLevel<minNf;bLevel++){
        for(let k=g.start;k<g.end;k++){
          const n1=notes[k], n2=notes[k+1];
          const x1=4+n1.c*cw+cw/2;
          const x2=4+n2.c*cw+cw/2;
          const sx1=dir===-1?(x1+4):(x1-4);
          const sx2=dir===-1?(x2+4):(x2-4);
          const by=iy+dir*stemLen-dir*bLevel*3;
          svg+=`<line x1="${sx1}" y1="${by}" x2="${sx2}" y2="${by}" stroke="var(--note)" stroke-width="2"/>`;
        }
      }
      // Extra beams for notes with more flags than the group minimum
      for(let k=g.start;k<=g.end;k++){
        const n=notes[k];
        if(n.nFlags>minNf){
          const xn=4+n.c*cw+cw/2;
          const sxn=dir===-1?(xn+4):(xn-4);
          for(let bLevel=minNf;bLevel<n.nFlags;bLevel++){
            const by=iy+dir*stemLen-dir*bLevel*3;
            // Short beam: extend toward neighbor
            const neighbor=(k<g.end)?1:-1;
            const ext=neighbor*cw*0.4;
            svg+=`<line x1="${sxn}" y1="${by}" x2="${sxn+ext}" y2="${by}" stroke="var(--note)" stroke-width="2"/>`;
          }
        }
      }
    });
  });

  // Barline
  svg+=`<line x1="${w-1}" y1="${top}" x2="${w-1}" y2="${top+4*lg}" stroke="var(--staff)" stroke-width="1.5"/>`;
  svg+=`</svg></div></div>`;
  return svg;
}

// Enhanced synth that respects articulations
function synthWithArt(ctx,id,freq,art,t){
  const subDur=60/state.bpm/state.defaultSubs/2; // half a subdivision = 32nd
  // 32nd note handling for any instrument
  if(art==='32-both'){ synth(ctx,id,freq,t); synth(ctx,id,freq,t+subDur); return; }
  if(art==='32-first'){ synth(ctx,id,freq,t); return; }
  if(art==='32-second'){ synth(ctx,id,freq,t+subDur); return; }
  // Snare articulations
  if(id==='snare'){
    if(art==='ghost'){
      const b=ctx.createBuffer(1,ctx.sampleRate*0.08,ctx.sampleRate),d=b.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
      const s=ctx.createBufferSource();s.buffer=b;
      const ng=ctx.createGain();ng.gain.setValueAtTime(0.2,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.08);
      s.connect(ng);ng.connect(ctx.destination);s.start(t);
    } else if(art==='rimclick'){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.connect(g);g.connect(ctx.destination);
      o.frequency.setValueAtTime(1800,t);o.frequency.exponentialRampToValueAtTime(800,t+0.02);
      g.gain.setValueAtTime(0.5,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.04);
      o.start(t);o.stop(t+0.04);
    } else if(art==='rimshot'){
      const b=ctx.createBuffer(1,ctx.sampleRate*0.15,ctx.sampleRate),d=b.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
      const s=ctx.createBufferSource();s.buffer=b;
      const ng=ctx.createGain();ng.gain.setValueAtTime(1,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.15);
      s.connect(ng);ng.connect(ctx.destination);s.start(t);
      const o=ctx.createOscillator(),og=ctx.createGain();o.type="triangle";
      o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(100,t+0.06);
      og.gain.setValueAtTime(0.8,t);og.gain.exponentialRampToValueAtTime(0.001,t+0.06);
      o.connect(og);og.connect(ctx.destination);o.start(t);o.stop(t+0.06);
    } else { synth(ctx,id,freq,t); }
    return;
  }
  // Cymbal voice overrides (HH / Ride)
  if(id==='hihat'||id==='hihat_open'||id==='ride'){
    if(art==='crash') { synth(ctx,'crash',0,t); return; }
    if(art==='china') { synth(ctx,'china',0,t); return; }
    if(art==='bell')  { synth(ctx,'bell',0,t); return; }
    if(art==='open')  { synth(ctx,'hihat_open',0,t); return; }
  }
  synth(ctx,id,freq,t);
}

function closePickers(){ document.querySelectorAll('.inst-picker').forEach(el=>el.remove()); }

function showInstPicker(el, currentId, idx){
  closePickers();
  const picker=document.createElement('div');
  picker.className='inst-picker';
  ALL_INST.forEach(inst=>{
    const isCurrent=inst.id===currentId;
    const div=document.createElement('div');
    div.className='inst-picker-item';
    if(isCurrent) div.style.fontWeight='700';
    div.innerHTML=`${inst.name} <span class="ip-abbr">${inst.abbr}</span>`;
    div.onclick=()=>{ replaceInst(currentId,inst.id,idx); closePickers(); };
    picker.appendChild(div);
  });
  document.body.appendChild(picker);
  const rect=el.getBoundingClientRect();
  let top=rect.bottom+2, left=rect.left;
  // Clamp to viewport
  const pr=picker.getBoundingClientRect();
  if(top+pr.height>window.innerHeight) top=rect.top-pr.height-2;
  if(left+pr.width>window.innerWidth) left=window.innerWidth-pr.width-8;
  picker.style.top=top+'px'; picker.style.left=left+'px';
  setTimeout(()=>{
    const handler=e=>{ if(!picker.contains(e.target)){closePickers();document.removeEventListener('mousedown',handler);} };
    document.addEventListener('mousedown',handler);
  },0);
}

function showAddInstPicker(el){
  closePickers();
  const picker=document.createElement('div');
  picker.className='inst-picker';
  const available=ALL_INST.filter(i=>!state.activeIds.includes(i.id));
  if(!available.length){
    picker.innerHTML='<div style="padding:8px 10px;font-size:11px;color:var(--dim)">All instruments added</div>';
  } else {

      const div=document.createElement('div');

      div.onclick=()=>{ addInst(inst.id); closePickers(); };
      picker.appendChild(div);
    });
  }
  document.body.appendChild(picker);
  const rect=el.getBoundingClientRect();
  let top=rect.bottom+2, left=rect.left;
  const pr=picker.getBoundingClientRect();
  if(top+pr.height>window.innerHeight) top=rect.top-pr.height-2;
  if(left+pr.width>window.innerWidth) left=window.innerWidth-pr.width-8;
  picker.style.top=top+'px'; picker.style.left=left+'px';
  setTimeout(()=>{
    const handler=e=>{ if(!picker.contains(e.target)&&e.target!==el){closePickers();document.removeEventListener('mousedown',handler);} };
    document.addEventListener('mousedown',handler);
  },0);
}

function removeInst(id){
  if(state.activeIds.length<=1)return; // keep at least 1
  state.activeIds=state.activeIds.filter(x=>x!==id);
  render();
}

function replaceInst(oldId, newId, idx){
  if(oldId===newId)return;
  // Replace in activeIds at the same position
  const pos=state.activeIds.indexOf(oldId);
  if(pos===-1)return;
  // If newId already exists, swap positions
  const existingPos=state.activeIds.indexOf(newId);
  if(existingPos!==-1){
    state.activeIds[existingPos]=oldId;
  }
  state.activeIds[pos]=newId;
  render();
}

function addInst(id){
  if(!state.activeIds.includes(id)){
    state.activeIds.push(id);
    render();
  }
}

function loadSongData(s){
  console.log('[loadSongData] Start, sections:',s?.sections?.length,'bpm:',s?.bpm);

  state.sections=s.sections||[];
  state.activeIds=s.activeIds||["kick","snare","hihat","tom1","tom2"];
  state.bpm=s.bpm||120;
  state.defaultBeats=s.defaultBeats||4;
  state.defaultSubs=s.defaultSubs||4;

  if(el('defSubsSelect')) el('defSubsSelect').value=state.defaultSubs;

// Save to localStorage
function saveSong(){
  const name=document.getElementById('saveName').value.trim();if(!name)return;
  const songs=getSavedSongs();
  const data=getCurrentSongData(); data.name=name;
  // Deep copy sections to avoid reference issues
  data.sections=JSON.parse(JSON.stringify(state.sections));
  // Update if same name exists
  const existing=songs.findIndex(s=>s.name===name);
  if(existing>=0) songs[existing]=data; else songs.push(data);

// Export as JSON file download
function exportSong(){
  const data=getCurrentSongData();
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=(data.songTitle||'drum-song').replace(/[^a-zA-Z0-9ก-๙]/g,'_')+'.json';
  a.click(); URL.revokeObjectURL(url);

// Import JSON file
function importSong(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.sections){alert('Invalid file format');return;}
      loadSongData(data);
      // Also add to saved songs
      const songs=getSavedSongs();
      const name=data.name||data.songTitle||file.name.replace('.json','');
      data.name=name;
      const existing=songs.findIndex(s=>s.name===name);
      if(existing>=0) songs[existing]=data; else songs.push(data);
      setSavedSongs(songs);
      hideModal('saveModal');
    }catch(err){alert('Error reading file: '+err.message);}
  };
  reader.readAsText(file);
  e.target.value=''; // reset file input
}

/* ═══ GOOGLE DRIVE via Apps Script ═══ */
const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbwna7MXXdJu8nbi32vwHYZGXOSNLYa2MOUtdZHY9Ur7j_uoQeOMCLDZDqU0GEWEMU_x1w/exec';

let driveFiles=[];
let driveSlEditData=null;
let drivePwd=''; // cached after first successful auth

function driveStatus(msg){
  const el=document.getElementById('driveStatus');
  if(el) el.textContent=msg;
}

function isDriveConfigured(){
  if(APPS_SCRIPT_URL.includes('YOUR_APPS_SCRIPT')){
    driveStatus('⚠️ Set APPS_SCRIPT_URL first');
    return false;
  }
  return true;
}

function getDrivePwd(){
  if(drivePwd)return drivePwd;
  const pwd=prompt('🔒 Enter Drive password:');
  if(!pwd)return null;
  drivePwd=pwd;
  return pwd;
}

// GET helper (with password)
async function driveGet(params){
  if(!isDriveConfigured())return null;
  const pwd=getDrivePwd();if(!pwd)return null;
  params.pwd=pwd;
  const url=APPS_SCRIPT_URL+'?'+new URLSearchParams(params).toString();
  const res=await fetch(url);
  const data=await res.json();
  if(data?.error==='Invalid password'){drivePwd='';driveStatus('❌ Wrong password');return null;}
  return data;
}

// POST helper (with password)
async function drivePost(body){
  if(!isDriveConfigured())return null;
  const pwd=getDrivePwd();if(!pwd)return null;
  body.pwd=pwd;
  const res=await fetch(APPS_SCRIPT_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(body),
  });
  const data=await res.json();
  if(data?.error==='Invalid password'){drivePwd='';driveStatus('❌ Wrong password');return null;}
  return data;
}
