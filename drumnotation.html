// Load song from Drive — non-blocking wrapper
function driveLoadSong(fileId,title){
  // Close modal SYNCHRONOUSLY first
  document.querySelectorAll('.modal-overlay').forEach(m=>{
    m.classList.add('hidden');
    m.style.removeProperty('display'); // ensure no stuck inline style
  });

  // Show loading message on page
  document.getElementById('sectionsContainer').innerHTML=
    '<div style="padding:40px;text-align:center;color:var(--dim);font-size:14px">📥 Loading "'+title+'" from Drive...</div>';

  // Do the actual fetch in next tick so UI updates first
  setTimeout(()=>{ _driveLoadSongAsync(fileId,title); },50);
}

async function _driveLoadSongAsync(fileId,title){
  console.log('[Drive] Loading:',fileId,title);
  try{
    const data=await driveGet({action:'read',id:fileId});
    if(!data||data.error){
      alert('❌ '+(data?.error||'Failed to load'));
      render();
      return;
    }

    let content;
    try{
      content=typeof data.content==='string'?JSON.parse(data.content):data.content;
    }catch(parseErr){
      alert('❌ Parse error: '+parseErr.message);
      render();
      return;
    }

    if(!content||!content.sections){
      alert('⚠️ Invalid file format');
      render();
      return;
    }

    loadSongData(content);
    console.log('[Drive] Loaded OK');

  }catch(e){
    console.error('[Drive] Error:',e);
    alert('❌ '+e.message);
    render();
  }
}

// Delete file
async function driveDelete(fileId,title){
  if(!confirm('Delete "'+title+'" from Google Drive?'))return;
  driveStatus('🗑 Deleting...');
  try{
    const result=await drivePost({action:'delete',id:fileId});
    if(!result||result.error){driveStatus('❌ '+(result?.error||'Failed'));return;}
    driveStatus('✅ Deleted');
    await driveListSongs();
  }catch(e){ driveStatus('❌ '+e.message); }
}

// Share song — get public read-only link (no password needed to view)
async function driveShareSong(fileId){
  driveStatus('🔗 Getting share link...');
  try{
    const data=await driveGet({action:'sharelink',id:fileId});
    if(!data||data.error){driveStatus('❌ '+(data?.error||'Failed'));return;}
    const url=data.url;
    // Copy to clipboard and show
    try{ await navigator.clipboard.writeText(url); }catch{}
    prompt('🔗 Share this link (copied to clipboard):\nFriends can view the notation without password.',url);
    driveStatus('✅ Share link ready!');
  }catch(e){ driveStatus('❌ '+e.message); }
}

// Create setlist
async function driveCreateSetlist(){
  const name=document.getElementById('driveSlName').value.trim();
  if(!name)return;
  const filename=name.replace(/[^a-zA-Z0-9ก-๙_\-\s]/g,'_')+'_setlist.json';
  driveStatus('📋 Creating setlist...');
  try{
    const slData={name,songs:[],createdAt:new Date().toISOString()};
    const result=await drivePost({action:'save',filename:filename,content:JSON.stringify(slData)});
    if(!result||result.error){driveStatus('❌ '+(result?.error||'Failed'));return;}
    driveStatus('✅ Created');
    document.getElementById('driveSlName').value='';
    await driveListSongs();
  }catch(e){ driveStatus('❌ '+e.message); }
}

// Edit setlist
async function driveSlEdit(fileId,title){
  driveStatus('✏️ Loading setlist...');
  try{
    const data=await driveGet({action:'read',id:fileId});
    if(!data||data.error){driveStatus('❌ '+(data?.error||'Failed'));return;}
    const content=JSON.parse(data.content);
    driveSlEditData={id:fileId,title,name:content.name||title.replace('_setlist.json',''),songs:content.songs||[]};
    renderDriveSlEditor();
    document.getElementById('driveSlEditor').classList.remove('hidden');
    driveStatus('✅ Loaded');
  }catch(e){ driveStatus('❌ '+e.message); }
}

function renderDriveSlEditor(){
  if(!driveSlEditData)return;
  document.getElementById('driveSlEditName').textContent='Editing: '+driveSlEditData.name;
  const el=document.getElementById('driveSlSongs');
  if(!driveSlEditData.songs.length){el.innerHTML='<p style="color:var(--dim);font-size:11px">Empty — add songs</p>';return;}
  let h='';
  driveSlEditData.songs.forEach((s,i)=>{
    const name=typeof s==='string'?s:(s.title||s.name||'?');
    h+=`<div class="saved-item" style="padding:4px 6px">
      <span style="width:20px;text-align:center;font-weight:700;font-size:11px;color:var(--dim)">${i+1}</span>
      <span class="name">${name}</span>
      <button class="mini-btn" onclick="driveSlMove(${i},-1)">▲</button>
      <button class="mini-btn" onclick="driveSlMove(${i},1)">▼</button>
      <button class="mini-btn danger" onclick="driveSlRemove(${i})">✕</button>
    </div>`;
  });
  el.innerHTML=h;
}

function driveSlMove(i,dir){
  const t=i+dir;if(t<0||t>=driveSlEditData.songs.length)return;
  [driveSlEditData.songs[i],driveSlEditData.songs[t]]=[driveSlEditData.songs[t],driveSlEditData.songs[i]];
  renderDriveSlEditor();
}
function driveSlRemove(i){
  driveSlEditData.songs.splice(i,1);
  renderDriveSlEditor();
}
function driveSlPickerToggle(){
  const el=document.getElementById('driveSlPicker');
  el.classList.toggle('hidden');
  if(!el.classList.contains('hidden')){
    const songs=driveFiles.filter(f=>!f.title?.includes('_setlist'));
    let h='<div style="font-size:10px;font-weight:700;color:var(--dim);margin-bottom:4px">Select a song:</div>';
    songs.forEach(f=>{
      h+=`<div class="saved-item" style="cursor:pointer;padding:4px 6px" onclick="driveSlAddSong('${f.id}','${f.title.replace(/'/g,"\\'")}')">
        <span class="name">${f.title}</span>
        <span style="font-size:10px;color:#2e7d32">+ Add</span>
      </div>`;
    });
    if(!songs.length) h+='<p style="color:var(--dim);font-size:11px">No songs in Drive</p>';
    el.innerHTML=h;
  }
}
function driveSlAddSong(id,title){
  if(!driveSlEditData)return;
  driveSlEditData.songs.push({id,title});
  renderDriveSlEditor();
  document.getElementById('driveSlPicker').classList.add('hidden');
}

async function driveSlSave(){
  if(!driveSlEditData)return;
  driveStatus('💾 Saving setlist...');
  try{
    const data={name:driveSlEditData.name,songs:driveSlEditData.songs,updatedAt:new Date().toISOString()};
    const result=await drivePost({action:'save',filename:driveSlEditData.title,content:JSON.stringify(data)});
    if(!result||result.error){driveStatus('❌ '+(result?.error||'Failed'));return;}
    driveStatus('✅ Saved!');
    driveSlCancel();
    await driveListSongs();
  }catch(e){ driveStatus('❌ '+e.message); }
}
function driveSlCancel(){
  driveSlEditData=null;
  document.getElementById('driveSlEditor').classList.add('hidden');
}

// Load setlist and activate navigator
async function driveSlLoad(fileId,title){
  driveStatus('▶ Loading setlist...');
  try{
    const data=await driveGet({action:'read',id:fileId});
    if(!data||data.error){driveStatus('❌ '+(data?.error||'Failed'));return;}
    const content=JSON.parse(data.content);
    if(content&&content.songs?.length){
      currentSetlist={name:content.name,songs:content.songs,source:'drive'};
      currentSetlistIdx=0;
      const first=content.songs[0];
      const fId=typeof first==='string'?null:(first.id);
      const fTitle=typeof first==='string'?first:(first.title||first.name);
      if(fId) await driveLoadSong(fId,fTitle);
      showSetlistBar();
      updateSetlistBar();
      hideModal('saveModal');
      driveStatus('✅ Setlist loaded!');
    } else { driveStatus('⚠️ Empty or invalid setlist'); }
  }catch(e){ driveStatus('❌ '+e.message); }
}

// Override setlist navigation for Drive setlists
const _origSlPrev=slPrev, _origSlNext=slNext;
slPrev=async function(){
  if(!currentSetlist||currentSetlistIdx<=0)return;
  currentSetlistIdx--;
  if(currentSetlist.source==='drive'){
    const s=currentSetlist.songs[currentSetlistIdx];
    const fId=typeof s==='string'?null:(s.id);
    const fTitle=typeof s==='string'?s:(s.title||s.name);
    if(fId) await driveLoadSong(fId,fTitle);
  } else { loadSetlistSong(currentSetlistIdx); }
  updateSetlistBar();
};
slNext=async function(){
  if(!currentSetlist||currentSetlistIdx>=currentSetlist.songs.length-1)return;
  currentSetlistIdx++;
  if(currentSetlist.source==='drive'){
    const s=currentSetlist.songs[currentSetlistIdx];
    const fId=typeof s==='string'?null:(s.id);
    const fTitle=typeof s==='string'?s:(s.title||s.name);
    if(fId) await driveLoadSong(fId,fTitle);
  } else { loadSetlistSong(currentSetlistIdx); }
  updateSetlistBar();
};

updateSetlistBar=function(){
  if(!currentSetlist)return;
  document.getElementById('slName').textContent=currentSetlist.name;
  const s=currentSetlist.songs[currentSetlistIdx];
  const sName=typeof s==='string'?s:(s.title||s.name||'?');
  document.getElementById('slPos').textContent=
    `Song ${currentSetlistIdx+1}/${currentSetlist.songs.length}: ${sName}`;
};

function renderSongsPanel(){
  const songs=getSavedSongs();
  if(!songs.length){document.getElementById('savedList').innerHTML='<p style="color:var(--dim);font-size:11px;text-align:center">No saved songs yet</p>';return;}
  let h='';
  songs.forEach((s,i)=>{
    h+=`<div class="saved-item"><span class="name">${s.name}</span>
      <span class="bpm-info">${s.bpm} BPM</span>
      <button class="mini-btn" onclick="loadSong(${i})">Load</button>
      <button class="mini-btn" onclick="exportSongByIdx(${i})">📤</button>
      <button class="mini-btn danger" onclick="deleteSong(${i})">✕</button></div>`;
  });
  document.getElementById('savedList').innerHTML=h;
}

function exportSongByIdx(idx){
  const s=getSavedSongs()[idx];if(!s)return;
  const json=JSON.stringify(s,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=(s.name||'drum-song').replace(/[^a-zA-Z0-9ก-๙]/g,'_')+'.json';
  a.click(); URL.revokeObjectURL(url);
}

/* ═══ SETLIST ═══ */
let currentSetlist=null; // {name, songs:[songName,...]}
let currentSetlistIdx=-1; // which song in the setlist is loaded

function createSetlist(){
  const name=document.getElementById('setlistName').value.trim();if(!name)return;
  const setlists=getSavedSetlists();
  const existing=setlists.findIndex(s=>s.name===name);
  if(existing>=0){alert('Setlist "'+name+'" already exists');return;}
  setlists.push({name,songs:[]});
  setSavedSetlists(setlists);
  document.getElementById('setlistName').value='';
  renderSetlistPanel();
}

function renderSetlistPanel(){
  const setlists=getSavedSetlists();
  let h='';
  if(!setlists.length){
    h='<p style="color:var(--dim);font-size:11px;text-align:center">No setlists yet</p>';
  } else {
    setlists.forEach((sl,i)=>{
      h+=`<div class="saved-item">
        <span class="name">${sl.name} <span style="font-size:10px;color:var(--dim)">(${sl.songs.length} songs)</span></span>
        <button class="mini-btn" onclick="loadSetlist(${i})">▶ Load</button>
        <button class="mini-btn" onclick="editSetlist(${i})">✎ Edit</button>
        <button class="mini-btn" onclick="exportSetlist(${i})">📤</button>
        <button class="mini-btn danger" onclick="deleteSetlist(${i})">✕</button>
      </div>`;
    });
  }
  document.getElementById('setlistList').innerHTML=h;
}

function editSetlist(idx){
  const setlists=getSavedSetlists();
  const sl=setlists[idx];if(!sl)return;
  document.getElementById('setlistEditor').classList.remove('hidden');
  document.getElementById('editingSetlistName').textContent='Editing: '+sl.name;
  document.getElementById('setlistEditor').dataset.idx=idx;

  // Render songs in setlist
  let h='';
  sl.songs.forEach((name,i)=>{
    h+=`<div class="sl-song-item">
      <span class="sl-num">${i+1}</span>
      <span class="sl-title">${name}</span>
      <span class="sl-remove" onclick="moveInSetlist(${idx},${i},-1)">▲</span>
      <span class="sl-remove" onclick="moveInSetlist(${idx},${i},1)">▼</span>
      <span class="sl-remove" onclick="removeSongFromSetlist(${idx},${i})">✕</span>
    </div>`;
  });
  document.getElementById('setlistSongs').innerHTML=h||'<p style="color:var(--dim);font-size:10px">Empty setlist</p>';

  // Populate add-song dropdown
  const songs=getSavedSongs();
  let opts='<option value="">-- add song --</option>';
  songs.forEach(s=>{opts+=`<option value="${s.name}">${s.name}</option>`;});
  document.getElementById('addSongToSetlist').innerHTML=opts;
}

function addSongToCurrentSetlist(){
  const idx=+document.getElementById('setlistEditor').dataset.idx;
  const songName=document.getElementById('addSongToSetlist').value;
  if(!songName)return;
  const setlists=getSavedSetlists();
  setlists[idx].songs.push(songName);
  setSavedSetlists(setlists);
  editSetlist(idx);
}

function removeSongFromSetlist(slIdx,songIdx){
  const setlists=getSavedSetlists();
  setlists[slIdx].songs.splice(songIdx,1);
  setSavedSetlists(setlists);
  editSetlist(slIdx);
}

function moveInSetlist(slIdx,songIdx,dir){
  const setlists=getSavedSetlists();
  const arr=setlists[slIdx].songs;
  const t=songIdx+dir;
  if(t<0||t>=arr.length)return;
  [arr[songIdx],arr[t]]=[arr[t],arr[songIdx]];
  setSavedSetlists(setlists);
  editSetlist(slIdx);
}

function deleteSetlist(idx){
  const setlists=getSavedSetlists();
  setlists.splice(idx,1);setSavedSetlists(setlists);
  renderSetlistPanel();
  document.getElementById('setlistEditor').classList.add('hidden');
}

function exportSetlist(idx){
  const sl=getSavedSetlists()[idx];if(!sl)return;
  // Export setlist + all its songs as one bundle
  const songs=getSavedSongs();
  const bundle={type:'drumSetlistBundle',setlist:sl,
    songs:sl.songs.map(name=>songs.find(s=>s.name===name)).filter(Boolean)};
  const json=JSON.stringify(bundle,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=(sl.name||'setlist').replace(/[^a-zA-Z0-9ก-๙]/g,'_')+'_setlist.json';
  a.click();URL.revokeObjectURL(url);
}

// Load setlist => show navigator bar
function loadSetlist(idx){
  const sl=getSavedSetlists()[idx];if(!sl||!sl.songs.length){alert('Setlist is empty');return;}
  currentSetlist=sl;
  currentSetlistIdx=0;
  loadSetlistSong(0);
  showSetlistBar();
  hideModal('saveModal');
}

function loadSetlistSong(idx){
  const songs=getSavedSongs();
  const entry=currentSetlist.songs[idx];
  const songName=typeof entry==='string'?entry:(entry.title||entry.name||'');
  // Try exact match, then try without .json extension
  let song=songs.find(s=>s.name===songName)||songs.find(s=>s.name===songName.replace('.json',''));
  if(!song){alert('Song "'+songName+'" not found in local storage. Load it from Drive first.');return;}
  currentSetlistIdx=idx;
  loadSongData(song);
  updateSetlistBar();
}

function showSetlistBar(){document.getElementById('setlistBar').classList.remove('hidden');}
function hideSetlistBar(){document.getElementById('setlistBar').classList.add('hidden');}

function updateSetlistBar(){
  if(!currentSetlist)return;
  document.getElementById('slName').textContent=currentSetlist.name;
  document.getElementById('slPos').textContent=
    `Song ${currentSetlistIdx+1}/${currentSetlist.songs.length}: ${currentSetlist.songs[currentSetlistIdx]}`;
}

function slPrev(){
  if(!currentSetlist||currentSetlistIdx<=0)return;
  loadSetlistSong(currentSetlistIdx-1);
}
function slNext(){
  if(!currentSetlist||currentSetlistIdx>=currentSetlist.songs.length-1)return;
  loadSetlistSong(currentSetlistIdx+1);
}
function closeSetlist(){
  currentSetlist=null;currentSetlistIdx=-1;
  hideSetlistBar();
}
function showModal(id){const el=document.getElementById(id);el.classList.remove('hidden');el.style.removeProperty('display');if(id==='instModal')renderInstModal();if(id==='saveModal'){switchTab('songs');}}
function hideModal(id){document.getElementById(id).classList.add('hidden');}

/* ═══ INIT ═══ */
render();
</script>
